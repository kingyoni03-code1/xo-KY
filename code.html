    <script
        id="tailwind-config">tailwind.config = { darkMode: "class", theme: { extend: { colors: { "tertiary-fixed-dim": "#d87dff", "on-secondary-fixed": "#620061", "surface-container-high": "#1f1f27", "on-tertiary": "#390050", "surface-container-low": "#13131a", "primary-container": "#00e3fd", "on-secondary-container": "#fff5f9", "on-primary-fixed": "#003840", "tertiary-container": "#b90afc", "tertiary-fixed": "#e092ff", "inverse-primary": "#006976", "on-primary-fixed-variant": "#005762", "on-tertiary-fixed": "#2c003f", "error-container": "#9f0519", "error-dim": "#d7383b", background: "#0e0e14", "on-surface-variant": "#acaab3", "inverse-surface": "#fcf8ff", error: "#ff716c", "surface-container-highest": "#25252e", "on-secondary": "#400040", "surface-variant": "#25252e", "surface-container-lowest": "#000000", "on-error": "#490006", "secondary-container": "#a900a9", "tertiary-dim": "#b90afc", "on-background": "#f6f2fc", outline: "#76747d", "on-tertiary-container": "#ffffff", primary: "#81ecff", "primary-dim": "#00d4ec", "on-surface": "#f6f2fc", "primary-fixed": "#00e3fd", "on-primary-container": "#004d57", "secondary-dim": "#ff51fa", "secondary-fixed": "#ffbdf3", "inverse-on-surface": "#55545c", "surface-tint": "#81ecff", "on-error-container": "#ffa8a3", "primary-fixed-dim": "#00d4ec", "surface-container": "#191921", "surface-bright": "#2b2b35", secondary: "#ff51fa", "on-secondary-fixed-variant": "#920091", "on-tertiary-fixed-variant": "#600084", "outline-variant": "#48474f", "secondary-fixed-dim": "#ffa6f3", tertiary: "#d575ff", surface: "#0e0e14", "on-primary": "#005762", "surface-dim": "#0e0e14" }, borderRadius: { DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px" }, fontFamily: { headline: ["Space Grotesk"], body: ["Manrope"], label: ["Space Grotesk"], display: "Space Grotesk" } } } };</script>
    <style>
        .neon-text-primary {
            text-shadow: 0 0 10px rgba(129, 236, 255, 0.6), 0 0 20px rgba(129, 236, 255, 0.4);
        }

        .neon-text-secondary {
            text-shadow: 0 0 10px rgba(255, 81, 250, 0.6), 0 0 20px rgba(255, 81, 250, 0.4);
        }

        .laser-beam-h,
        .laser-beam-v {
            box-shadow: 0 0 15px theme('colors.primary'), 0 0 30px theme('colors.primary') inset;
        }

        /* --- New VFX Styles --- */
        @keyframes camera-shake {
            0% {
                transform: translate(0, 0) rotate(0deg);
            }

            20% {
                transform: translate(-5px, 5px) rotate(-1deg);
            }

            40% {
                transform: translate(5px, -5px) rotate(1deg);
            }

            60% {
                transform: translate(-5px, -5px) rotate(-1deg);
            }

            80% {
                transform: translate(5px, 5px) rotate(1deg);
            }

            100% {
                transform: translate(0, 0) rotate(0deg);
            }
        }

        .animate-shake {
            animation: camera-shake 0.2s cubic-bezier(.36, .07, .19, .97) both;
        }

        /* Ghost / Hover Symbol */
        .ghost-symbol {
            opacity: 0.3;
            pointer-events: none;
            position: absolute;
        }

        .ghost-symbol.scanline-flicker {
            background: repeating-linear-gradient(to bottom,
                    transparent,
                    transparent 2px,
                    rgba(255, 255, 255, 0.1) 3px,
                    transparent 4px);
            -webkit-background-clip: text;
            animation: flicker 0.15s infinite alternate;
        }

        @keyframes flicker {
            0% {
                opacity: 0.2;
            }

            100% {
                opacity: 0.4;
            }
        }

        /* Error Overload */
        @keyframes error-pulse {
            0% {
                filter: drop-shadow(0 0 10px theme('colors.error'));
            }

            50% {
                filter: drop-shadow(0 0 40px theme('colors.error')) hue-rotate(-20deg);
            }

            100% {
                filter: drop-shadow(0 0 10px theme('colors.error'));
            }
        }

        .error-overload {
            animation: error-pulse 0.4s ease-out;
            pointer-events: none;
        }

        /* Particles */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 40;
            animation: particle-burst 0.6s ease-out forwards;
        }

        @keyframes particle-burst {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }

            100% {
                transform: translate(var(--tx), var(--ty)) scale(0);
                opacity: 0;
            }
        }

        /* Critical State (Win) */
        .critical-bloom {
            text-shadow: 0 0 30px currentColor, 0 0 60px currentColor, 0 0 90px currentColor !important;
            transform: scale(1.1);
            transition: all 0.3s ease-out;
            z-index: 50;
        }

        /* Laser Connection */
        .laser-connection {
            position: absolute;
            background: #fff;
            height: 4px;
            transform-origin: left center;
            z-index: 45;
            pointer-events: none;
            box-shadow: 0 0 20px 5px theme('colors.primary');
            /* Heat distortion simulated with blur and high contrast overlay */
            backdrop-filter: blur(4px) brightness(1.5) contrast(1.5);
            animation: laser-fire 0.3s ease-out forwards;
        }

        @keyframes laser-fire {
            0% {
                transform: scaleX(0);
                opacity: 0;
            }

            50% {
                opacity: 1;
                height: 8px;
            }

            100% {
                transform: scaleX(1);
                opacity: 0.8;
                height: 4px;
            }
        }

        /* Loser Glitch */
        @keyframes glitch-dim {
            0% {
                opacity: 1;
                transform: translate(0);
            }

            20% {
                opacity: 0;
                transform: translate(-2px, 2px);
            }

            40% {
                opacity: 1;
                transform: translate(2px, -2px);
            }

            60% {
                opacity: 0.5;
                transform: translate(0);
            }

            80% {
                opacity: 0;
            }

            100% {
                opacity: 0.15;
                filter: grayscale(1);
            }
        }

        .glitch-dim {
            animation: glitch-dim 0.5s steps(2, end) forwards;
        }

        /* CRT Effects */
        .crt-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 100;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            box-shadow: inset 0 0 100px rgba(0, 0, 0, 0.9);
        }

        @keyframes crt-glitch {
            0% {
                transform: translate(0)
            }

            20% {
                transform: translate(-2px, 1px)
            }

            40% {
                transform: translate(-1px, -1px)
            }

            60% {
                transform: translate(2px, 1px)
            }

            80% {
                transform: translate(1px, -1px)
            }

            100% {
                transform: translate(0)
            }
        }

        .crt-flicker {
            animation: crt-glitch 0.2s infinite;
            opacity: 0.1;
        }

        /* Ultimate Board */
        .global-cell {
            transition: all 0.3s ease;
            position: relative;
        }

        .global-cell.active-board {
            box-shadow: 0 0 20px rgba(129, 236, 255, 0.3) inset, 0 0 10px rgba(129, 236, 255, 0.5);
            border-color: rgba(129, 236, 255, 0.8);
            background: rgba(129, 236, 255, 0.05);
        }

        .global-cell.inactive-board {
            opacity: 0.3;
            filter: grayscale(0.8);
            pointer-events: none;
        }

        .local-cell {
            background: rgba(255, 255, 255, 0.02);
            transition: all 0.2s;
        }

        .local-cell:hover {
            background: rgba(129, 236, 255, 0.15);
        }

        .global-winner-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(14, 14, 20, 0.85);
            backdrop-filter: blur(4px);
            z-index: 10;
        }

        /* --- Light Mode Overrides --- */
        html:not(.dark) body {
            background-color: #ffffff !important;
            color: #1f2937 !important;
        }

        html:not(.dark) header,
        html:not(.dark) nav,
        html:not(.dark) .hidden.md\:flex {
            background-color: rgba(255, 255, 255, 0.9) !important;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1) !important;
        }

        html:not(.dark) .bg-surface-container-high\/80 {
            background-color: rgba(255, 255, 255, 0.9) !important;
            outline-color: rgba(0, 0, 0, 0.1) !important;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1) !important;
        }

        html:not(.dark) .text-on-surface-variant {
            color: #4b5563 !important;
        }

        html:not(.dark) .crt-overlay {
            display: none !important;
        }

        html:not(.dark) .local-cell {
            background-color: rgba(255, 255, 255, 0.5) !important;
            border-color: rgba(0, 0, 0, 0.1) !important;
        }

        html:not(.dark) .local-cell:hover {
            background-color: rgba(0, 229, 255, 0.1) !important;
        }

        html:not(.dark) .laser-beam-h,
        html:not(.dark) .laser-beam-v {
            background-color: rgba(0, 0, 0, 0.1) !important;
            box-shadow: none !important;
            mix-blend-mode: normal !important;
        }

        html:not(.dark) .neon-text-primary,
        html:not(.dark) .neon-text-secondary {
            text-shadow: none !important;
        }

        html:not(.dark) #score-x,
        html:not(.dark) #score-o {
            color: #1f2937 !important;
        }

        html:not(.dark) #status-text {
            color: #1f2937 !important;
        }

        html:not(.dark) .text-\[\#00E5FF\] {
            color: #008eb3 !important;
        }
    </style>
</head>

<body
